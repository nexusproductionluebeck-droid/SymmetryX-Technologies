<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#2A5581"/>
      <stop offset="55%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0A1B30"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1024" y2="1024">
      <stop offset="0%" stop-color="#1A8A7D"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A8A7D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1A8A7D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Outer magnetic ring -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="url(#stroke)" stroke-width="8" opacity="0.45"/>

  <!-- Inner glow disc -->
  <circle cx="512" cy="512" r="260" fill="url(#glow)"/>

  <!-- MagnaX-Lock wordmark stroke: stylised "M / X" -->
  <path d="M 260 700 L 380 324 L 512 580 L 644 324 L 764 700"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="52"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Magnetic core dot -->
  <circle cx="512" cy="512" r="46" fill="#1A8A7D"/>
  <circle cx="512" cy="512" r="18" fill="#FFFFFF"/>
</svg>
