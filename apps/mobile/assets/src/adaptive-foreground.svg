<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Android adaptive icon foreground: keep critical art inside the inner
    ~66% safe zone because the OS crops it into circle/squircle/etc.
  -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A8A7D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1A8A7D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="512" cy="512" r="300" fill="none" stroke="#1A8A7D" stroke-width="6" opacity="0.45"/>
  <circle cx="512" cy="512" r="220" fill="url(#glow)"/>

  <path d="M 310 660 L 404 380 L 512 560 L 620 380 L 714 660"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="46"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <circle cx="512" cy="512" r="38" fill="#1A8A7D"/>
  <circle cx="512" cy="512" r="14" fill="#FFFFFF"/>
</svg>
